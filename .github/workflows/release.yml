name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run compile
        working-directory: packages/zor-code
      - name: Rename binary for platform
        shell: bash
        run: |
          BIN_DIR="packages/zor-code/dist"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp "$BIN_DIR/zor-code.exe" "$BIN_DIR/zor-code-linux-x86_64"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "$BIN_DIR/zor-code.exe" "$BIN_DIR/zor-code-darwin-arm64"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$BIN_DIR/zor-code.exe" "$BIN_DIR/zor-code-windows-x86_64.exe"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: zor-code-${{ matrix.os }}
          path: packages/zor-code/dist/zor-code*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: zor-code-*
          merge-multiple: true
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
